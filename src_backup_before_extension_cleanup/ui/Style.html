<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f3f4f6;
    color: #111827;
  }

  .app-shell {
    min-height: 100vh;
    display: flex;
  }

  .sidebar {
    width: 260px;
    background: #111827;
    color: #ffffff;
    padding: 24px 18px;
  }

  .brand {
    margin-bottom: 28px;
    padding: 0 8px;
  }

  .brand-title {
    font-weight: 700;
    font-size: 20px;
  }

  .brand-subtitle {
    color: #9ca3af;
    font-size: 13px;
    margin-top: 4px;
  }

  .menu {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .menu-item {
    border: none;
    background: transparent;
    color: #d1d5db;
    padding: 12px 14px;
    border-radius: 10px;
    text-align: left;
    cursor: pointer;
    font-size: 14px;
  }

  .menu-item:hover,
  .menu-item.active {
    background: #1f2937;
    color: #ffffff;
  }

  .main {
    flex: 1;
    min-width: 0;
  }

  .topbar {
    background: #ffffff;
    border-bottom: 1px solid #e5e7eb;
    padding: 20px 28px;
    display: flex;
    justify-content: space-between;
    gap: 16px;
    align-items: center;
  }

  .topbar h1 {
    margin: 0;
    font-size: 24px;
  }

  .topbar p {
    margin: 6px 0 0;
    color: #6b7280;
  }

  .user-box {
    text-align: right;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    padding: 10px 14px;
    border-radius: 10px;
    min-width: 220px;
  }

  .user-box div {
    font-weight: 700;
  }

  .user-box small {
    color: #6b7280;
  }

  .content {
    padding: 28px;
  }

  .card {
    background: #ffffff;
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    margin-bottom: 20px;
  }

  .card h2 {
    margin-top: 0;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 16px;
  }

  .stat-card {
    background: #ffffff;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .stat-label {
    color: #6b7280;
    font-size: 14px;
    margin-bottom: 10px;
  }

  .stat-value {
    font-size: 32px;
    font-weight: 700;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 10px;
    font-size: 14px;
  }

  .info-label {
    color: #6b7280;
  }

  .info-value {
    font-weight: 600;
  }

  .alert {
    margin: 20px 28px 0;
    padding: 14px 16px;
    border-radius: 10px;
    border: 1px solid #f59e0b;
    background: #fffbeb;
    color: #92400e;
  }

  .alert.error {
    border-color: #ef4444;
    background: #fef2f2;
    color: #991b1b;
  }

  .hidden {
    display: none;
  }

  .button {
    background: #111827;
    color: #ffffff;
    border: none;
    padding: 11px 16px;
    border-radius: 9px;
    cursor: pointer;
  }

  .button:hover {
    background: #374151;
  }

  pre {
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    padding: 16px;
    border-radius: 10px;
    overflow: auto;
  }

  @media (max-width: 900px) {
    .app-shell {
      flex-direction: column;
    }

    .sidebar {
      width: 100%;
    }

    .topbar {
      flex-direction: column;
      align-items: flex-start;
    }

    .user-box {
      text-align: left;
      width: 100%;
    }

    .stats-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 520px) {
    .stats-grid {
      grid-template-columns: 1fr;
    }

    .info-grid {
      grid-template-columns: 1fr;
    }
  }

  .table-wrapper {
    overflow-x: auto;
  }

  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  .data-table th,
  .data-table td {
    border-bottom: 1px solid #e5e7eb;
    padding: 10px 8px;
    text-align: left;
    vertical-align: top;
  }

  .data-table th {
    background: #f9fafb;
    color: #374151;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group label {
    font-size: 13px;
    color: #374151;
    font-weight: 600;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    border: 1px solid #d1d5db;
    border-radius: 8px;
    padding: 10px;
    font-size: 14px;
  }

  .form-group.full {
    grid-column: 1 / -1;
  }

  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .button.secondary {
    background: #6b7280;
  }

  .button.danger {
    background: #b91c1c;
  }

  .badge {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 999px;
    background: #e5e7eb;
    font-size: 12px;
  }

  .badge.active {
    background: #dcfce7;
    color: #166534;
  }

  .badge.inactive {
    background: #fee2e2;
    color: #991b1b;
  }
</style>
